<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <!-- Redirect already-logged-in users straight to products -->
  <script>if(localStorage.getItem('kd_isLoggedIn')==='true')location.replace('pages/products.html');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso Privado — KitsDigitalia</title>
  <meta name="description" content="Entrada restrita. Acesso liberado apenas para membros autorizados." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <style>
    html, body { height: 100%; }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ---- Top bar ---- */
    .login-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2rem;
      border-bottom: 1px solid rgba(255,109,0,.07);
      background: rgba(6,6,9,.9);
      backdrop-filter: blur(20px);
      position: relative;
      z-index: 10;
    }
    .login-topbar__right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .login-back-link {
      font-size: .82rem;
      color: var(--text-muted);
      transition: color var(--transition);
    }
    .login-back-link:hover { color: var(--orange); }

    /* ---- Page wrapper ---- */
    .login-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* ---- Card ---- */
    .login-card {
      width: 100%;
      max-width: 440px;
      background: rgba(12,12,21,.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2.75rem 2.5rem 2.25rem;
      box-shadow: 0 0 60px rgba(0,0,0,.6), 0 0 40px rgba(255,109,0,.04);
      position: relative;
      overflow: hidden;
    }
    /* Top glow accent line */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,109,0,.6), transparent);
      border-radius: 50%;
    }

    /* ---- Card header ---- */
    .login-card__top {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px; height: 60px;
      border-radius: 16px;
      background: rgba(255,109,0,.12);
      border: 1px solid rgba(255,109,0,.25);
      font-size: 1.85rem;
      margin-bottom: .85rem;
      box-shadow: 0 0 25px rgba(255,109,0,.2);
      animation: icon-pulse 3s ease-in-out infinite;
    }
    @keyframes icon-pulse {
      0%,100% { box-shadow: 0 0 25px rgba(255,109,0,.2); }
      50%      { box-shadow: 0 0 40px rgba(255,109,0,.4); }
    }
    .login-card__top h2 {
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: .3rem;
    }
    .login-card__top p {
      font-size: .875rem;
      color: var(--text-muted);
      margin: 0;
    }

    /* ---- Google button ---- */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      padding: .78rem 1.25rem;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
      margin-bottom: 1.5rem;
    }
    .btn-google:hover {
      border-color: rgba(66,133,244,.5);
      background: rgba(66,133,244,.07);
      color: var(--white);
      box-shadow: 0 0 15px rgba(66,133,244,.1);
    }

    /* ---- Or divider ---- */
    .or-line {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
      font-size: .78rem;
      color: var(--text-muted);
    }
    .or-line::before,
    .or-line::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ---- Form ---- */
    .login-form .form-group { margin-bottom: 1.1rem; }
    .login-form label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .38rem;
    }
    .login-form label a {
      font-weight: 400;
      font-size: .78rem;
      color: var(--text-muted);
    }
    .login-form label a:hover { color: var(--orange); }

    .pw-wrapper { position: relative; }
    .pw-wrapper input { padding-right: 3rem; }
    .pw-toggle {
      position: absolute;
      right: .85rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: .95rem;
      line-height: 1;
      padding: 0;
      transition: color var(--transition);
    }
    .pw-toggle:hover { color: var(--orange); }

    /* Error box */
    .login-error {
      display: none;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius);
      padding: .65rem 1rem;
      font-size: .84rem;
      color: #f87171;
      margin-bottom: 1rem;
    }
    .login-error.visible { display: block; }

    /* Remember row */
    .remember-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1.5rem;
    }
    .remember-row input[type=checkbox] { accent-color: var(--orange); }
    .remember-row label { font-size: .84rem; color: var(--text-muted); cursor: pointer; margin: 0; }

    /* Submit button */
    .login-submit {
      width: 100%;
      justify-content: center;
      font-size: 1.05rem;
      padding: .9rem;
    }

    /* ---- Trust row ---- */
    .login-trust {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.4rem;
      font-size: .76rem;
      color: var(--text-muted);
    }
    .login-trust-sep { color: var(--border); }

    /* ---- Bottom link ---- */
    .login-card__footer {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: .84rem;
      color: var(--text-muted);
    }
    .login-card__footer a { color: var(--orange); font-weight: 600; }

    /* ---- Page footer ---- */
    .login-page-footer {
      padding: 1.25rem;
      text-align: center;
      font-size: .76rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(255,109,0,.06);
      position: relative;
      z-index: 1;
    }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem 1.75rem; }
      .login-topbar { padding: 1rem 1.25rem; }
    }
  </style>
</head>
<body>

<!-- ===== ANIMATED BACKGROUND ===== -->
<div class="bg-fx" aria-hidden="true">
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>
  <div class="bg-grid"></div>
</div>

<!-- ===== TOP BAR ===== -->
<div class="login-topbar">
  <a href="index.html" class="navbar__logo" style="font-size:1.25rem;">
    Kits<span>Digitalia</span>
  </a>
  <div class="login-topbar__right">
    <!-- Language Switcher -->
    <div class="lang-switcher" role="group" aria-label="Language selector">
      <button class="lang-btn active" data-lang="pt">PT</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
    <a href="index.html" class="login-back-link">
      <span data-i18n="login-back">← Voltar para o início</span>
    </a>
  </div>
</div>

<!-- ===== LOGIN CARD ===== -->
<div class="login-page">
  <div class="login-card">

    <!-- Card header -->
    <div class="login-card__top">
      <div class="login-logo-icon">⚡</div>
      <h2 data-i18n="login-title">Acesso Privado</h2>
      <p data-i18n="login-sub">Entrada liberada apenas para membros</p>
    </div>

    <!-- Google SSO (UI only) -->
    <button class="btn-google" onclick="handleGoogleLogin()" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.448 14.013 17.64 11.772 17.64 9.2z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span data-i18n="login-google">Continuar com Google</span>
    </button>

    <div class="or-line">
      <span data-i18n="login-or">ou entre com email</span>
    </div>

    <!-- Error message -->
    <div class="login-error" id="loginError" role="alert">
      Email ou senha incorretos. Tente novamente.
    </div>

    <!-- Login form -->
    <form id="loginForm" class="login-form" autocomplete="on" novalidate>

      <div class="form-group">
        <label for="loginEmail">
          <span data-i18n="login-email-label">Endereço de Email</span>
        </label>
        <input
          type="email"
          id="loginEmail"
          name="email"
          placeholder="seu@email.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="loginPassword">
          <span data-i18n="login-pw-label">Senha</span>
          <a href="#" onclick="return false;" data-i18n="login-forgot">Esqueceu a senha?</a>
        </label>
        <div class="pw-wrapper">
          <input
            type="password"
            id="loginPassword"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password">👁</button>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="rememberMe" name="remember" />
        <label for="rememberMe" data-i18n="login-remember">Mantenha-me conectado</label>
      </div>

      <button type="submit" class="btn btn-primary login-submit">
        <span data-i18n="login-btn">Solicitar acesso →</span>
      </button>

    </form>

    <!-- Trust row -->
    <div class="login-trust">
      <span data-i18n="login-trust-1">🔒 Acesso seguro</span>
      <span class="login-trust-sep">·</span>
      <span data-i18n="login-trust-2">Sem spam. Nunca.</span>
      <span class="login-trust-sep">·</span>
      <span data-i18n="login-trust-3">Cancele quando quiser</span>
    </div>

    <!-- Footer link -->
    <div class="login-card__footer">
      <span data-i18n="login-no-account">Ainda não é membro?</span>
      &nbsp;
      <a href="index.html" data-i18n="login-see-inside">Veja o que está dentro →</a>
    </div>

  </div>
</div>

<!-- ===== PAGE FOOTER ===== -->
<div class="login-page-footer">
  © 2025 <span data-i18n="login-footer">KitsDigitalia</span>
</div>

<script src="scripts/main.js"></script>
<script>
  /* ---- Password toggle ---- */
  const pwToggle = document.getElementById('pwToggle');
  const pwInput  = document.getElementById('loginPassword');
  pwToggle.addEventListener('click', () => {
    const isText = pwInput.type === 'text';
    pwInput.type     = isText ? 'password' : 'text';
    pwToggle.textContent = isText ? '👁' : '🙈';
  });

  /* ---- Login form submit ---- */
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');

    errEl.classList.remove('visible');

    if (!email || !pass) {
      errEl.textContent = 'Por favor preencha email e senha.';
      errEl.classList.add('visible');
      return;
    }
    if (pass.length < 4) {
      errEl.textContent = 'A senha deve ter pelo menos 4 caracteres.';
      errEl.classList.add('visible');
      return;
    }

    // Set auth and redirect
    localStorage.setItem('kd_isLoggedIn', 'true');
    localStorage.setItem('kd_userEmail', email);

    const btn = this.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.querySelector('[data-i18n]').textContent = '⏳ Entrando…';

    setTimeout(() => {
      window.location.href = 'pages/products.html';
    }, 650);
  });

  /* ---- Google login (UI only) ---- */
  function handleGoogleLogin() {
    const btn = document.querySelector('.btn-google');
    btn.disabled = true;
    btn.querySelector('[data-i18n]').textContent = '⏳ Conectando…';
    setTimeout(() => {
      localStorage.setItem('kd_isLoggedIn', 'true');
      localStorage.setItem('kd_userEmail', 'google-user@gmail.com');
      window.location.href = 'pages/products.html';
    }, 900);
  }
</script>
</body>
</html>
