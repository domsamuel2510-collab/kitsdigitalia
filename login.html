<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso Privado — KitsDigitalia</title>
  <meta name="description" content="Entrada restrita. Acesso liberado apenas para membros autorizados." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .login-topbar { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2rem; border-bottom: 1px solid rgba(255,109,0,.07); background: rgba(6,6,9,.9); backdrop-filter: blur(20px); position: relative; z-index: 10; }
    .login-topbar__right { display: flex; align-items: center; gap: 1.25rem; }
    .login-back-link { font-size: .82rem; color: var(--text-muted); transition: color var(--transition); }
    .login-back-link:hover { color: var(--orange); }
    .login-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; position: relative; z-index: 1; }
    .login-card { width: 100%; max-width: 440px; background: rgba(12,12,21,.92); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 2.75rem 2.5rem 2.25rem; box-shadow: 0 0 60px rgba(0,0,0,.6), 0 0 40px rgba(255,109,0,.04); position: relative; overflow: hidden; }
    .login-card::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,109,0,.6), transparent); border-radius: 50%; }
    .login-card__top { text-align: center; margin-bottom: 2rem; }
    .login-logo-icon { display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 16px; background: rgba(255,109,0,.12); border: 1px solid rgba(255,109,0,.25); font-size: 1.85rem; margin-bottom: .85rem; box-shadow: 0 0 25px rgba(255,109,0,.2); animation: icon-pulse 3s ease-in-out infinite; }
    @keyframes icon-pulse { 0%,100% { box-shadow: 0 0 25px rgba(255,109,0,.2); } 50% { box-shadow: 0 0 40px rgba(255,109,0,.4); } }
    .login-card__top h2 { font-size: 1.55rem; font-weight: 800; color: var(--white); margin-bottom: .3rem; }
    .login-card__top p { font-size: .875rem; color: var(--text-muted); margin: 0; }
    .login-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .login-tab { flex: 1; padding: .6rem; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--text-muted); font-size: .88rem; font-weight: 600; cursor: pointer; transition: all var(--transition); font-family: inherit; }
    .login-tab.active { background: rgba(255,109,0,.12); border-color: rgba(255,109,0,.4); color: var(--orange); }
    .btn-google { width: 100%; display: flex; align-items: center; justify-content: center; gap: .75rem; padding: .78rem 1.25rem; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: .95rem; font-weight: 500; cursor: pointer; transition: all var(--transition); font-family: inherit; margin-bottom: 1.5rem; }
    .btn-google:hover { border-color: rgba(66,133,244,.5); background: rgba(66,133,244,.07); color: var(--white); box-shadow: 0 0 15px rgba(66,133,244,.1); }
    .btn-google:disabled { opacity: .6; cursor: not-allowed; }
    .or-line { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.5rem; font-size: .78rem; color: var(--text-muted); }
    .or-line::before, .or-line::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .login-form .form-group { margin-bottom: 1.1rem; }
    .login-form label { display: flex; justify-content: space-between; align-items: center; font-size: .85rem; font-weight: 600; color: var(--text); margin-bottom: .38rem; }
    .login-form label a { font-weight: 400; font-size: .78rem; color: var(--text-muted); }
    .login-form label a:hover { color: var(--orange); }
    .pw-wrapper { position: relative; }
    .pw-wrapper input { padding-right: 3rem; }
    .pw-toggle { position: absolute; right: .85rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: .95rem; line-height: 1; padding: 0; transition: color var(--transition); }
    .pw-toggle:hover { color: var(--orange); }
    .login-msg { display: none; border-radius: var(--radius); padding: .65rem 1rem; font-size: .84rem; margin-bottom: 1rem; }
    .login-msg.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    .login-msg.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: #4ade80; }
    .login-msg.visible { display: block; }
    .login-submit { width: 100%; justify-content: center; font-size: 1.05rem; padding: .9rem; }
    .login-trust { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-top: 1.4rem; font-size: .76rem; color: var(--text-muted); }
    .login-trust-sep { color: var(--border); }
    .login-card__footer { text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: .84rem; color: var(--text-muted); }
    .login-card__footer a { color: var(--orange); font-weight: 600; }
    .login-page-footer { padding: 1.25rem; text-align: center; font-size: .76rem; color: var(--text-muted); border-top: 1px solid rgba(255,109,0,.06); position: relative; z-index: 1; }
    @media (max-width: 480px) { .login-card { padding: 2rem 1.5rem 1.75rem; } .login-topbar { padding: 1rem 1.25rem; } }
  </style>
</head>
<body>
  <div class="bg-fx" aria-hidden="true">
    <div class="bg-orb bg-orb--1"></div><div class="bg-orb bg-orb--2"></div><div class="bg-orb bg-orb--3"></div><div class="bg-grid"></div>
  </div>
  <div class="login-topbar">
    <a href="index.html" class="navbar__logo" style="font-size:1.25rem;">Kits<span>Digitalia</span></a>
    <div class="login-topbar__right">
      <div class="lang-switcher" role="group">
        <button class="lang-btn active" data-lang="pt">PT</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="it">IT</button>
      </div>
      <a href="index.html" class="login-back-link">← Voltar para o início</a>
    </div>
  </div>
  <div class="login-page">
    <div class="login-card">
      <div class="login-card__top">
        <div class="login-logo-icon">⚡</div>
        <h2>Acesso Privado</h2>
        <p>Entrada liberada apenas para membros</p>
      </div>
      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
        <button class="login-tab" id="tabRegister" onclick="switchTab('register')">Criar conta</button>
      </div>
      <button class="btn-google" id="btnGoogle" onclick="handleGoogleLogin()" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.448 14.013 17.64 11.772 17.64 9.2z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        <span id="googleBtnText">Continuar com Google</span>
      </button>
      <div class="or-line"><span>ou use seu email</span></div>
      <div class="login-msg error" id="msgError"></div>
      <div class="login-msg success" id="msgSuccess"></div>
      <form id="formLogin" class="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="loginEmail">Endereço de Email</label>
          <input type="email" id="loginEmail" name="email" placeholder="seu@email.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="loginPassword"><span>Senha</span><a href="#" onclick="handleForgotPassword(event)">Esqueceu a senha?</a></label>
          <div class="pw-wrapper">
            <input type="password" id="loginPassword" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pwToggle">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary login-submit" id="btnLogin">Entrar →</button>
      </form>
      <form id="formRegister" class="login-form" autocomplete="on" novalidate style="display:none">
        <div class="form-group">
          <label for="regEmail">Endereço de Email</label>
          <input type="email" id="regEmail" name="email" placeholder="seu@email.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="regPassword">Senha (mínimo 6 caracteres)</label>
          <div class="pw-wrapper">
            <input type="password" id="regPassword" name="password" placeholder="••••••••" autocomplete="new-password" required />
            <button type="button" class="pw-toggle" id="pwToggleReg">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary login-submit" id="btnRegister">Criar conta →</button>
      </form>
      <div class="login-trust"><span>🔒 Acesso seguro</span><span class="login-trust-sep">·</span><span>Sem spam. Nunca.</span></div>
      <div class="login-card__footer"><span>Ainda não é membro?</span>&nbsp;<a href="index.html">Veja o que está dentro →</a></div>
    </div>
  </div>
  <div class="login-page-footer">© 2025 KitsDigitalia</div>
  <script src="scripts/main.js"></script>
  <script>
    const SUPA_URL = 'https://tdofhjcxykmskekpmcyi.supabase.co';
    const SUPARKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkb2ZoamN4eWttc2tla3BtY3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMjE0OTUsImV4cCI6MjA5MTc5NzQ5NX0.rO3trrGiI0Yjwn-iBYADNRMCL2K2nu_ARWGrZbCw-Gk';
    const { createClient } = supabase;
    const sb = createClient(SUPA_URL, SUPARKEY);
    
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        localStorage.setItem('kd_isLoggedIn', 'true');
        localStorage.setItem('kd_userEmail', session.user?.email || '');
        window.location.href = 'pages/products.html';
      }
    })();
    
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
      document.getElementById('formLogin').style.display = isLogin ? '' : 'none';
      document.getElementById('formRegister').style.display = isLogin ? 'none' : '';
      document.getElementById('msgError').classList.remove('visible');
      document.getElementById('msgSuccess').classList.remove('visible');
    }
    function showError(msg) { const el = document.getElementById('msgError'); el.textContent = msg; el.classList.add('visible'); document.getElementById('msgSuccess').classList.remove('visible'); }
    function showSuccess(msg) { const el = document.getElementById('msgSuccess'); el.textContent = msg; el.classList.add('visible'); document.getElementById('msgError').classList.remove('visible'); }
    
    async function handleGoogleLogin() {
      const btn = document.getElementById('btnGoogle');
      btn.disabled = true;
      document.getElementById('googleBtnText').textContent = '⏳ Conectando...';
      document.getElementById('msgError').classList.remove('visible');
      try {
        const { data, error } = await sb.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: 'https://kitsdigitalia.com/pages/products.html', skipBrowserRedirect: false, queryParams: { access_type: 'offline', prompt: 'consent' } }
        });
        if (error) throw error;
        if (data?.url) window.location.href = data.url;
      } catch (err) {
        showError('Erro ao conectar com Google: ' + err.message);
        btn.disabled = false;
        document.getElementById('googleBtnText').textContent = 'Continuar com Google';
      }
    }
    
    document.getElementById('formLogin').addEventListener('submit', async function(e) {
      e.preventDefault();
      document.getElementById('msgError').classList.remove('visible');
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      const btn = document.getElementById('btnLogin');
      if (!email || !pass) return showError('Preencha email e senha.');
      btn.disabled = true; btn.textContent = '⏳ Entrando...';
      const { data: loginData, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) { showError(error.message.includes('Invalid') ? 'Email ou senha incorretos.' : error.message); btn.disabled = false; btn.textContent = 'Entrar →'; }
      else {
        localStorage.setItem('kd_isLoggedIn', 'true');
        localStorage.setItem('kd_userEmail', loginData?.user?.email || email);
        window.location.href = 'pages/products.html';
      }
    });
    
    document.getElementById('formRegister').addEventListener('submit', async function(e) {
      e.preventDefault();
      document.getElementById('msgError').classList.remove('visible');
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value;
      const btn = document.getElementById('btnRegister');
      if (!email || !pass) return showError('Preencha todos os campos.');
      if (pass.length < 6) return showError('A senha precisa ter pelo menos 6 caracteres.');
      btn.disabled = true; btn.textContent = '⏳ Criando conta...';
      const { error } = await sb.auth.signUp({ email, password: pass, options: { emailRedirectTo: 'https://kitsdigitalia.com/pages/products.html' } });
      if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Criar conta →'; }
      else { showSuccess('✅ Conta criada! Verifique seu email para confirmar o cadastro.'); btn.disabled = false; btn.textContent = 'Criar conta →'; }
    });
    
    async function handleForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) return showError('Digite seu email primeiro.');
      document.getElementById('msgError').classList.remove('visible');
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://kitsdigitalia.com/login.html' });
      if (error) showError(error.message);
      else showSuccess('📧 Email de recuperação enviado!');
    }
    
    function setupPwToggle(tid, iid) {
      document.getElementById(tid).addEventListener('click', () => {
        const i = document.getElementById(iid);
        const isT = i.type === 'text'; i.type = isT ? 'password' : 'text';
        document.getElementById(tid).textContent = isT ? '👁' : '🙈';
      });
    }
    setupPwToggle('pwToggle', 'loginPassword');
    setupPwToggle('pwToggleReg', 'regPassword');
    sb.auth.onAuthStateChange((ev, ses) => {
      if (ev === 'SIGNED_IN' && ses) {
        localStorage.setItem('kd_isLoggedIn', 'true');
        localStorage.setItem('kd_userEmail', ses.user?.email || '');
        // Só redireciona se ainda estiver na página de login
        if (window.location.pathname.includes('login')) {
          window.location.href = 'pages/products.html';
        }
      }
      if (ev === 'SIGNED_OUT') {
        localStorage.removeItem('kd_isLoggedIn');
        localStorage.removeItem('kd_userEmail');
      }
    });
  </script>
</body>
</html>
